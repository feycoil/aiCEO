<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Inter, sans-serif">
  <rect width="1200" height="900" fill="#faf8f3"/>

  <!-- Header -->
  <text x="60" y="60" font-size="32" font-weight="800" fill="#1a1612" letter-spacing="-1">aiCEO Moodboard</text>
  <text x="60" y="90" font-size="14" fill="#6b614f" font-family="JetBrains Mono, monospace">Phase 1 v0.8 — 29/04/2026 — Voix exec moderne (Hub · Compass · North Star · Sync · Pulse)</text>
  <line x1="60" y1="110" x2="1140" y2="110" stroke="#ebe7dc" stroke-width="1"/>

  <!-- ========== SECTION 1 : PALETTE ========== -->
  <text x="60" y="160" font-size="11" font-weight="800" fill="#463a54" letter-spacing="2">01 — PALETTE</text>

  <rect x="60" y="180" width="120" height="120" fill="#faf8f3" stroke="#ebe7dc" stroke-width="1" rx="8"/>
  <text x="120" y="320" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1612">Ivory 50</text>
  <text x="120" y="335" text-anchor="middle" font-size="9" font-family="JetBrains Mono, monospace" fill="#6b614f">#faf8f3</text>

  <rect x="200" y="180" width="120" height="120" fill="#f5f3ee" rx="8"/>
  <text x="260" y="320" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1612">Ivory 100</text>
  <text x="260" y="335" text-anchor="middle" font-size="9" font-family="JetBrains Mono, monospace" fill="#6b614f">#f5f3ee</text>

  <rect x="340" y="180" width="120" height="120" fill="#ffffff" stroke="#ebe7dc" stroke-width="1" rx="8"/>
  <text x="400" y="320" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1612">Paper</text>
  <text x="400" y="335" text-anchor="middle" font-size="9" font-family="JetBrains Mono, monospace" fill="#6b614f">#ffffff</text>

  <rect x="480" y="180" width="120" height="120" fill="#1a1612" rx="8"/>
  <text x="540" y="320" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1612">Ink 900</text>
  <text x="540" y="335" text-anchor="middle" font-size="9" font-family="JetBrains Mono, monospace" fill="#6b614f">#1a1612</text>

  <rect x="620" y="180" width="120" height="120" fill="#463a54" rx="8"/>
  <text x="680" y="320" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1612">Compass 500</text>
  <text x="680" y="335" text-anchor="middle" font-size="9" font-family="JetBrains Mono, monospace" fill="#6b614f">#463a54</text>

  <rect x="760" y="180" width="120" height="120" fill="#d96d3e" rx="8"/>
  <text x="820" y="320" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1612">Sunrise</text>
  <text x="820" y="335" text-anchor="middle" font-size="9" font-family="JetBrains Mono, monospace" fill="#6b614f">#d96d3e</text>

  <rect x="900" y="180" width="120" height="120" fill="#115e3c" rx="8"/>
  <text x="960" y="320" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1612">Forest</text>
  <text x="960" y="335" text-anchor="middle" font-size="9" font-family="JetBrains Mono, monospace" fill="#6b614f">#115e3c</text>

  <!-- ========== SECTION 2 : TYPOGRAPHIE ========== -->
  <text x="60" y="395" font-size="11" font-weight="800" fill="#463a54" letter-spacing="2">02 — TYPOGRAPHIE</text>

  <text x="60" y="445" font-size="11" fill="#6b614f" font-family="JetBrains Mono, monospace">Signature — Aubrielle script</text>
  <text x="60" y="500" font-size="56" font-style="italic" fill="#1a1612" font-family="Brush Script MT, cursive">Bonjour Major</text>

  <text x="60" y="560" font-size="11" fill="#6b614f" font-family="JetBrains Mono, monospace">Corps — Fira Sans</text>
  <text x="60" y="600" font-size="32" font-weight="700" fill="#1a1612">Aa Bb Cc 123</text>
  <text x="60" y="630" font-size="14" fill="#3d362c">Naviguer clair. Trancher juste. Dormir serein.</text>

  <text x="600" y="560" font-size="11" fill="#6b614f" font-family="JetBrains Mono, monospace">Mono — JetBrains Mono</text>
  <text x="600" y="600" font-size="20" font-weight="700" fill="#1a1612" font-family="JetBrains Mono, monospace">COCKPIT 29/04 MATIN</text>
  <text x="600" y="625" font-size="13" fill="#3d362c" font-family="JetBrains Mono, monospace">Streak: 18j · Decisions: 5/sem</text>

  <!-- ========== SECTION 3 : 3 CARTES TYPES ========== -->
  <text x="60" y="700" font-size="11" font-weight="800" fill="#463a54" letter-spacing="2">03 — CARTES TYPES (voix exec)</text>

  <!-- Carte 1 — KPI tile (Streak avec anneau) -->
  <g transform="translate(60, 720)">
    <rect width="320" height="160" rx="12" fill="#ffffff" stroke="#ebe7dc" stroke-width="1"/>
    <text x="20" y="32" font-size="10" font-weight="700" fill="#6b614f" letter-spacing="1.5">STREAK</text>
    <circle cx="80" cy="100" r="40" fill="none" stroke="#ebe7dc" stroke-width="6"/>
    <circle cx="80" cy="100" r="40" fill="none" stroke="#463a54" stroke-width="6"
            stroke-dasharray="150.8 100"
            stroke-linecap="round"
            transform="rotate(-90 80 100)"/>
    <text x="80" y="105" text-anchor="middle" font-size="22" font-weight="800" fill="#1a1612">18</text>
    <text x="80" y="122" text-anchor="middle" font-size="9" fill="#6b614f">/30</text>
    <text x="160" y="90" font-size="14" font-weight="600" fill="#1a1612">jours consecutifs</text>
    <text x="160" y="110" font-size="11" fill="#6b614f">Cible North Star</text>
    <text x="160" y="130" font-size="10" font-weight="700" fill="#115e3c">Atteinte 100%</text>
  </g>

  <!-- Carte 2 — Decision card (avec rail couleur statut) -->
  <g transform="translate(420, 720)">
    <rect width="380" height="160" rx="12" fill="#ffffff" stroke="#ebe7dc" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="160" rx="2" fill="#92400e"/>
    <text x="20" y="30" font-size="10" font-weight="700" fill="#92400e" letter-spacing="1.5">DECISION OUVERTE</text>
    <text x="20" y="55" font-size="14" font-weight="700" fill="#1a1612">Recruter un CTO ou faire grandir le tech lead ?</text>
    <text x="20" y="78" font-size="12" fill="#3d362c">Le Stream R&amp;D demande une montee en stack mais</text>
    <text x="20" y="93" font-size="12" fill="#3d362c">le coute SaaS V1 est tendu cette annee.</text>
    <text x="20" y="125" font-size="10" font-family="JetBrains Mono, monospace" fill="#6b614f">STREAM R&amp;D · POSEE 27/04 · A TRANCHER</text>
    <text x="280" y="145" text-anchor="end" font-size="10" font-weight="600" fill="#463a54">Demander a l Assistant ›</text>
  </g>

  <!-- Carte 3 — Journey banner (Triage matin) -->
  <g transform="translate(840, 720)">
    <defs>
      <linearGradient id="journeyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#ece7f0;stop-opacity:1"/>
        <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1"/>
      </linearGradient>
    </defs>
    <rect width="300" height="160" rx="12" fill="url(#journeyGrad)" stroke="#d8d0e0" stroke-width="1"/>
    <text x="20" y="30" font-size="10" font-weight="700" fill="#463a54" letter-spacing="1.5">TRIAGE — MATIN 8H05</text>
    <text x="20" y="68" font-size="22" font-style="italic" fill="#1a1612" font-family="Brush Script MT, cursive">Bonjour Major.</text>
    <text x="20" y="98" font-size="12" fill="#3d362c">Voici votre journee : ce qui</text>
    <text x="20" y="113" font-size="12" fill="#3d362c">compte, ce qui peut attendre.</text>
    <rect x="20" y="125" width="160" height="28" rx="6" fill="#1a1612"/>
    <text x="100" y="143" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Lancer le Triage</text>
    <text x="280" y="32" font-size="14" fill="#463a54" opacity="0.4">✦</text>
  </g>

  <line x1="60" y1="880" x2="1140" y2="880" stroke="#ebe7dc" stroke-width="1"/>
  <text x="60" y="895" font-size="9" fill="#a8a092" font-family="JetBrains Mono, monospace">Voix exec moderne · 12 termes canoniques · Phase 1 valide · 29/04/2026 PM tardif</text>
</svg>
