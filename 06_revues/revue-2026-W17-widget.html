const QUADRANT_CONFIG = {
  do:       { title: "Faire",      subtitle: "Urgent + Important",       palette: { bg: "bg-rose-50",   border: "border-rose-300",   text: "text-rose-700",   badge: "bg-rose-500"   } },
  plan:     { title: "Planifier",  subtitle: "Important, non urgent",    palette: { bg: "bg-amber-50",  border: "border-amber-300",  text: "text-amber-700",  badge: "bg-amber-500"  } },
  delegate: { title: "Déléguer",   subtitle: "Urgent, moins important",  palette: { bg: "bg-sky-50",    border: "border-sky-300",    text: "text-sky-700",    badge: "bg-sky-500"    } },
  drop:     { title: "Abandonner", subtitle: "Ni urgent ni important",   palette: { bg: "bg-slate-100", border: "border-slate-300",  text: "text-slate-600",  badge: "bg-slate-400"  }, noStar: true },
};

function KpiRow({ label, value, tone }) {
  const toneMap = { rose: "text-rose-600", amber: "text-amber-600", emerald: "text-emerald-600", default: "text-slate-800" };
  return (
    <div className="flex justify-between items-center">
      <span className="text-sm text-slate-600">{label}</span>
      <span className={`font-bold ${toneMap[tone] || toneMap.default}`}>{value}</span>
    </div>
  );
}

function Quadrant({ config, items, onToggleDone, onToggleStar }) {
  const { palette, title, subtitle, noStar } = config;
  return (
    <div className={`rounded-xl border-2 ${palette.border} ${palette.bg} p-4`}>
      <div className="flex items-center justify-between mb-3">
        <div>
          <div className={`font-bold ${palette.text}`}>{title}</div>
          <div className="text-xs text-slate-500">{subtitle}</div>
        </div>
        <span className={`${palette.badge} text-white text-xs font-bold px-2 py-1 rounded`}>{items.length}</span>
      </div>
      <div className="space-y-2">
        {items.length === 0 ? (
          <p className="text-xs text-slate-400 italic">Aucun item</p>
        ) : (
          items.map((item) => (
            <div key={item.id} className="bg-white rounded-lg p-2.5 flex items-start gap-2 shadow-sm">
              <button onClick={() => onToggleDone(item.id)} className="flex-shrink-0 mt-0.5" aria-label="Toggle done">
                {item.done ? <CheckCircle2 className="w-4 h-4 text-emerald-500" /> : <Circle className="w-4 h-4 text-slate-300" />}
              </button>
              <div className="flex-1 min-w-0">
                <div className={`text-sm leading-tight ${item.done ? "text-slate-400 line-through" : "text-slate-700"}`}>{item.text}</div>
                {item.companies && item.companies.length > 0 && (
                  <div className="flex flex-wrap gap-1 mt-1">
                    {item.companies.map((code) => {
                      const c = COMPANIES[code];
                      if (!c) return null;
                      return (
                        <span key={code} title={c.full} className={`text-[9px] font-bold px-1.5 py-0.5 rounded border ${c.cls}`}>{c.label}</span>
                      );
                    })}
                  </div>
                )}
                <div className="text-xs text-slate-500 mt-1">{item.meta}</div>
              </div>
              {!noStar && (
                <button onClick={() => onToggleStar(item.id)} className="flex-shrink-0" aria-label="Toggle Vital Few">
                  <Star className={`w-4 h-4 ${item.starred ? "text-indigo-500 fill-indigo-500" : "text-slate-300 hover:text-indigo-400"}`} />
                </button>
              )}
            </div>
          ))
        )}
      </div>
    </div>
  );
}

function WeeklyReviewWidget() {
  const [data, setData] = useState(initialData);
  const [companyFilter, setCompanyFilter] = useState(null);

  const updateItem = (quadrant, id, patch) => {
    setData((d) => ({
      ...d,
      quadrants: {
        ...d.quadrants,
        [quadrant]: d.quadrants[quadrant].map((it) => (it.id === id ? { ...it, ...patch } : it)),
      },
    }));
  };

  const toggleRock = (id) => {
    setData((d) => ({
      ...d,
      bigRocks: d.bigRocks.map((r) => (r.id === id ? { ...r, done: !r.done } : r)),
    }));
  };

  const matchesFilter = (item) => !companyFilter || (item.companies && item.companies.includes(companyFilter));

  const filteredQuadrants = useMemo(() => {
    const out = {};
    Object.entries(data.quadrants).forEach(([k, items]) => { out[k] = items.filter(matchesFilter); });
    return out;
  }, [data.quadrants, companyFilter]);

  const vitalFew = useMemo(() => {
    const all = [];
    Object.entries(filteredQuadrants).forEach(([k, items]) => {
      items.forEach((item) => { if (item.starred) all.push({ ...item, quadrant: k }); });
    });
    return all;
  }, [filteredQuadrants]);

  const companyStats = useMemo(() => {
    const stats = {};
    Object.keys(COMPANIES).forEach((code) => { stats[code] = { open: 0, starred: 0, done: 0 }; });
    Object.entries(data.quadrants).forEach(([k, items]) => {
      items.forEach((item) => {
        (item.companies || []).forEach((code) => {
          if (!stats[code]) return;
          stats[code].open += 1;
          if (item.starred) stats[code].starred += 1;
          if (item.done) stats[code].done += 1;
        });
      });
    });
    return stats;
  }, [data.quadrants]);

  const allItems = Object.values(filteredQuadrants).flat();
  const doneCount = allItems.filter((i) => i.done).length;
  const totalCount = allItems.length;
  const progress = totalCount > 0 ? Math.round((doneCount / totalCount) * 100) : 0;
  const rocksDone = data.bigRocks.filter((r) => r.done).length;

  return (
    <div className="min-h-screen bg-slate-50 p-4 sm:p-6 font-sans text-slate-800">
      <div className="max-w-6xl mx-auto space-y-5">
        <header className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
          <div className="flex flex-wrap items-start justify-between gap-4 mb-4">
            <div>
              <div className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Revue hebdo · Semaine {data.week}</div>
              <div className="text-sm text-slate-400 mt-0.5">{data.dateRange}</div>
            </div>
            <div className="flex items-center gap-6">
              <div className="text-right">
                <div className="text-xs text-slate-500">Big Rocks</div>
                <div className="text-lg font-bold text-slate-800">{rocksDone} / {data.bigRocks.length}</div>
              </div>
              <div className="text-right">
                <div className="text-xs text-slate-500">Progression</div>
                <div className="text-2xl font-bold text-indigo-600">{progress}%</div>
              </div>
            </div>
          </div>

          <div className="flex items-start gap-3 bg-indigo-50 border-l-4 border-indigo-500 p-4 rounded">
            <Target className="w-5 h-5 text-indigo-600 flex-shrink-0 mt-0.5" />
            <div>
              <div className="text-xs font-semibold text-indigo-700 uppercase tracking-wider mb-1">Intention de la semaine</div>
              <div className="text-slate-700">{data.intention}</div>
            </div>
          </div>
        </header>

        <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
          <div className="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
            <div className="flex items-center gap-2 mb-4">
              <Mountain className="w-5 h-5 text-slate-700" />
              <h2 className="font-bold text-slate-800">3 Big Rocks</h2>
            </div>
            <div className="space-y-2">
              {data.bigRocks.map((rock) => (
                <button key={rock.id} onClick={() => toggleRock(rock.id)} className="w-full text-left flex items-center gap-3 p-3 rounded-lg hover:bg-slate-50 transition">
                  {rock.done ? <CheckCircle2 className="w-5 h-5 text-emerald-500 flex-shrink-0" /> : <Circle className="w-5 h-5 text-slate-300 flex-shrink-0" />}
                  <span className={rock.done ? "text-slate-400 line-through" : "text-slate-700"}>{rock.text}</span>
                </button>
              ))}
            </div>
          </div>

          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
            <div className="flex items-center gap-2 mb-4">
              <TrendingUp className="w-5 h-5 text-slate-700" />
              <h2 className="font-bold text-slate-800">État des lieux</h2>
            </div>
            <div className="space-y-3">
              <KpiRow label="Engagements ouverts" value={data.kpis.open} />
              <KpiRow label="En retard" value={data.kpis.overdue} tone="rose" />
              <KpiRow label="Décisions en attente" value={data.kpis.pendingDecisions} tone="amber" />
              <div className="pt-3 border-t border-slate-100">
                <KpiRow label="Soldés S-1" value={data.kpis.completedLastWeek} tone="emerald" />
              </div>
            </div>
          </div>
        </div>

        <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
          <div className="flex items-center justify-between mb-5">
            <h2 className="font-bold text-slate-800">Matrice d'Eisenhower — 4D</h2>
            <div className="text-xs text-slate-500 flex items-center gap-1">
              <Star className="w-3 h-3 fill-indigo-500 text-indigo-500" />
              = Vital Few (80/20)
            </div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {Object.entries(QUADRANT_CONFIG).map(([key, cfg]) => (
              <Quadrant
                key={key}
                config={cfg}
                items={filteredQuadrants[key]}
                onToggleDone={(id) => updateItem(key, id, { done: !data.quadrants[key].find((i) => i.id === id).done })}
                onToggleStar={(id) => updateItem(key, id, { starred: !data.quadrants[key].find((i) => i.id === id).starred })}
              />
            ))}
          </div>
        </section>

        <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
          <div className="flex items-center justify-between flex-wrap gap-3 mb-4">
            <div className="flex items-center gap-2">
              <Building2 className="w-5 h-5 text-slate-700" />
              <h2 className="font-bold text-slate-800">Vue par société</h2>
              <span className="text-xs text-slate-500 ml-1">Groupe TERRES ROUGES</span>
            </div>
            {companyFilter && (
              <button onClick={() => setCompanyFilter(null)} className="text-xs font-semibold px-3 py-1 rounded-full bg-indigo-600 text-white hover:bg-indigo-700">
                ✕ Réinitialiser le filtre
              </button>
            )}
          </div>
          <p className="text-xs text-slate-500 mb-3">Cliquez sur une société pour filtrer la matrice Eisenhower et le Vital Few.</p>
          <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2">
            {Object.entries(COMPANIES).map(([code, cfg]) => {
              const stat = companyStats[code];
              const active = companyFilter === code;
              const isEmpty = stat.open === 0;
              return (
                <button
                  key={code}
                  onClick={() => setCompanyFilter(active ? null : code)}
                  disabled={isEmpty && !active}
                  className={`text-left border rounded-lg p-3 transition ${active ? "ring-2 ring-indigo-500 border-indigo-500 bg-indigo-50" : isEmpty ? "border-slate-200 bg-slate-50 opacity-60 cursor-not-allowed" : "border-slate-200 hover:border-indigo-300 hover:bg-slate-50"}`}
                >
                  <div className="flex items-center justify-between mb-1">
                    <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded border ${cfg.cls}`}>{cfg.label}</span>
                    <span className="text-xs font-bold text-slate-800">{stat.open}</span>
                  </div>
                  <div className="text-xs font-semibold text-slate-700 leading-tight">{cfg.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1 leading-tight">{cfg.full}</div>
                  {stat.starred > 0 && (
                    <div className="mt-1 flex items-center gap-1 text-[10px] text-indigo-600">
                      <Star className="w-2.5 h-2.5 fill-indigo-500 text-indigo-500" />
                      {stat.starred} Vital Few
                    </div>
                  )}
                </button>
              );
            })}
          </div>
        </section>

        <section className="bg-gradient-to-br from-indigo-50 to-white rounded-2xl shadow-sm border border-indigo-200 p-6">
          <div className="flex items-center gap-2 mb-4">
            <Star className="w-5 h-5 text-indigo-600 fill-indigo-600" />
            <h2 className="font-bold text-slate-800">Vital Few — 80/20</h2>
            <span className="text-xs text-slate-500 ml-1">{vitalFew.length} item{vitalFew.length > 1 ? "s" : ""} étoilé{vitalFew.length > 1 ? "s" : ""}</span>
          </div>
          {vitalFew.length === 0 ? (
            <p className="text-sm text-slate-500 italic">Aucun item étoilé. Cliquez sur ★ dans la matrice pour identifier les 3–5 actions à plus fort impact.</p>
          ) : (
            <ol className="space-y-2">
              {vitalFew.map((item, idx) => (
                <li key={item.id} className="flex items-start gap-3">
                  <span className="flex-shrink-0 w-6 h-6 rounded-full bg-indigo-600 text-white text-xs font-bold flex items-center justify-center">{idx + 1}</span>
                  <div className="flex-1">
                    <div className={item.done ? "text-slate-400 line-through" : "text-slate-700"}>{item.text}</div>
                    <div className="text-xs text-slate-500 mt-0.5">{item.meta}</div>
                  </div>
                </li>
              ))}
            </ol>
          )}
        </section>

        <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
          <div className="flex items-center gap-2 mb-4">
            <Calendar className="w-5 h-5 text-slate-700" />
            <h2 className="font-bold text-slate-800">Plan de la semaine — 4P (Préparer → Réaliser)</h2>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
            {data.weekPlan.map((day, idx) => {
              const rock = data.bigRocks.find((r) => r.id === day.rock);
              return (
                <div key={idx} className="border border-slate-200 rounded-lg p-3 bg-slate-50 hover:bg-slate-100 transition">
                  <div className="text-xs font-bold text-slate-500 uppercase mb-1">{day.day}</div>
                  <div className="text-sm text-slate-700 mb-2 min-h-[2.5rem]">{day.theme}</div>
                  {rock && (
                    <div className="text-[11px] text-indigo-600 flex items-center gap-1">
                      <Mountain className="w-3 h-3" />
                      {rock.text.slice(0, 28)}{rock.text.length > 28 ? "…" : ""}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </section>

        <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
          <div className="flex items-center gap-2 mb-3">
            <ClipboardCheck className="w-5 h-5 text-slate-700" />
            <h2 className="font-bold text-slate-800">Revue de clôture — vendredi 17h</h2>
          </div>
          <p className="text-sm text-slate-500">Boucle de rétro qui alimente la revue du lundi suivant. Ce qui a marché, ce qui n'a pas marché, ce qui bascule sur S+1.</p>
        </section>

        <footer className="text-center text-xs text-slate-400 py-4">
          Template CEO Weekly Review · Eisenhower 4D + 80/20 + 4P
        </footer>
      </div>
    </div>
  );
}

const root = createRoot(document.getElementById("root"));
root.render(<WeeklyReviewWidget />);
  </script>
</body>
</html>
