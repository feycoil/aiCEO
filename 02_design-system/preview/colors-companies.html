<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Colors — Company chips</title>
<link rel="stylesheet" href="../assets/product.app.css"/>
<style>
  body { margin:0; background:#fff; padding:22px 24px; }

  .row { display:flex; flex-wrap:wrap; gap:10px 12px; }
  .one { display:flex; align-items:center; gap:8px; }
  .name { font:500 11.5px var(--font-sans); color:var(--text-2); letter-spacing:-0.005em; }
</style>
</head>
<body>
<div class="title">Company chips — 11 group entities</div>

  <div class="one"><span class="company-chip c-ADB">ADB</span><span class="name">Adabu</span></div>
  <div class="one"><span class="company-chip c-ETIC">ETIC</span><span class="name">ETIC Services</span></div>
  <div class="one"><span class="company-chip c-ITH">ITH</span><span class="name">ITH Data</span></div>
  <div class="one"><span class="company-chip c-LTM">LTM</span><span class="name">LTM</span></div>
  <div class="one"><span class="company-chip c-SCIS">SCIS</span><span class="name">SCI Start</span></div>
  <div class="one"><span class="company-chip c-FEIR">FEIR</span><span class="name">Feirasin</span></div>
  <div class="one"><span class="company-chip c-AMR">AMR</span><span class="name">AMANI Resorts</span></div>
  <div class="one"><span class="company-chip c-AMP">AMP</span><span class="name">AMANI Properties</span></div>
  <div class="one"><span class="company-chip c-TAM">TAM</span><span class="name">Tamarin 38</span></div>
  <div class="one"><span class="company-chip c-SCIMB">SCIMB</span><span class="name">SCI Mhssn-Boustane</span></div>
</div>
</body>
</html>
