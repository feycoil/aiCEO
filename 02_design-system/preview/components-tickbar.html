<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Tick-bar sparkline</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; background:#fff; padding:22px 24px; font-family:var(--font-sans); }
  .card { background:#fff; border:1px solid var(--border); border-radius:var(--radius-lg); padding:22px; box-shadow:var(--shadow-card); max-width:680px; }
  .hd { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
  .t { font:800 19px var(--font-sans); letter-spacing:-0.02em; }
  .date-pill { display:inline-flex; gap:6px; align-items:center; border:1px solid var(--border); border-radius:999px; padding:6px 12px; font:600 12px var(--font-sans); color:var(--text); }
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:28px; }
  .col { border-right:1px solid var(--border); padding-right:28px; }
  .col:last-child { border-right:none; }
  .lbl { font:600 12px var(--font-sans); color:var(--text-2); margin-bottom:4px; }
  .n { font:800 36px/1 var(--font-sans); letter-spacing:-0.035em; color:var(--text); font-variant-numeric:tabular-nums; }
  .ticks { display:flex; align-items:flex-end; gap:1px; height:38px; margin-top:12px; }
  .tick { width:1.5px; background:var(--border-2); border-radius:1px; }
</style>
</head>
<body>
<div class="card">
  <div class="hd">
    <div class="t">Avancement propositions</div>
    <div class="date-pill">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      11 avril 2026
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
    </div>
  </div>
  <div class="stats">
    <div class="col"><div class="lbl">Propositions envoyées</div><div class="n">64</div><div class="ticks" id="t1"></div></div>
    <div class="col"><div class="lbl">Entretiens</div><div class="n">12</div><div class="ticks" id="t2"></div></div>
    <div class="col"><div class="lbl">Signés</div><div class="n">10</div><div class="ticks" id="t3"></div></div>
  </div>
</div>
<script>
  function fill(id, accentAfter) {
    const n = document.getElementById(id);
    const total = 44;
    for (let i=0; i<total; i++) {
      const t = document.createElement('div');
      t.className='tick';
      t.style.height = (8 + Math.abs(Math.sin(i*1.3))*30) + 'px';
      if (i >= accentAfter) t.style.background = 'var(--rose)';
      n.appendChild(t);
    }
  }
  fill('t1', 24); fill('t2', 32); fill('t3', 34);
</script>
</body>
</html>
