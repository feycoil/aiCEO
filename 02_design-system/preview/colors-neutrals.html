<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Colors — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; background:#fff; padding:20px 24px; }
  .grid { display:grid; grid-template-columns: repeat(6, 1fr); gap:10px; }
  .sw { border-radius:14px; padding:10px 12px; min-height:90px; display:flex; flex-direction:column; justify-content:space-between; border:1px solid rgba(17,20,24,.06); }
  .sw .hex { font: 700 11px/1 var(--font-mono); opacity:.8; font-variant-numeric: tabular-nums; }
  .sw .name { font: 700 11px var(--font-sans); letter-spacing:-0.01em; }
  .sw .role { font: 500 10px var(--font-sans); opacity:.65; letter-spacing:0.02em; text-transform:uppercase; }
</style>
</head>
<body>
<div class="grid">
  <div class="sw" style="background:#a9adbe;color:#fff;border-color:#95999a"><div><div class="name">bg</div><div class="role">Frame</div></div><div class="hex">#A9ADBE</div></div>
  <div class="sw" style="background:#f5f3ef;color:#111418"><div><div class="name">surface</div><div class="role">App card</div></div><div class="hex">#F5F3EF</div></div>
  <div class="sw" style="background:#ffffff;color:#111418;border-color:#e4e1d9"><div><div class="name">surface-2</div><div class="role">Inner card</div></div><div class="hex">#FFFFFF</div></div>
  <div class="sw" style="background:#eeebe4;color:#111418"><div><div class="name">surface-3</div><div class="role">Pill / input</div></div><div class="hex">#EEEBE4</div></div>
  <div class="sw" style="background:#e4e1d9;color:#111418"><div><div class="name">border</div><div class="role">Hairline</div></div><div class="hex">#E4E1D9</div></div>
  <div class="sw" style="background:#cfcbc1;color:#111418"><div><div class="name">border-2</div><div class="role">Hover line</div></div><div class="hex">#CFCBC1</div></div>
  <div class="sw" style="background:#111418;color:#fff"><div><div class="name">text / brand</div><div class="role">Ink · primary</div></div><div class="hex">#111418</div></div>
  <div class="sw" style="background:#5b5e68;color:#fff"><div><div class="name">text-2</div><div class="role">Secondary</div></div><div class="hex">#5B5E68</div></div>
  <div class="sw" style="background:#9a9da8;color:#fff"><div><div class="name">text-3</div><div class="role">Muted</div></div><div class="hex">#9A9DA8</div></div>
</div>
</body>
</html>
