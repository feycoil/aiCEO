<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Premium / dotted card</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; background:#fff; padding:22px 24px; font-family:var(--font-sans); }
  .card {
    max-width:360px;
    background: var(--sky-50);
    background-image:
      radial-gradient(circle, rgba(119,144,174,.42) 1px, transparent 1.4px),
      linear-gradient(135deg, transparent 0%, rgba(255,255,255,.85) 100%);
    background-size: 14px 14px, 100% 100%;
    background-position: 0 0, 0 0;
    border:1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px;
    display:flex; flex-direction:column; gap:10px;
    box-shadow: var(--shadow-card);
  }
  .t { font:800 18px var(--font-sans); letter-spacing:-0.02em; color:var(--text); }
  .p { font:500 12.5px/1.5 var(--font-sans); color:var(--text-2); max-width:34ch; }
  .cta { margin-top:6px; display:flex; justify-content:space-between; align-items:center; padding:12px 18px; background:#fff; border-radius:999px; font:700 13px var(--font-sans); color:var(--text); cursor:pointer; }
  .cta svg { color:var(--text-3); }
</style>
</head>
<body>
<div class="card">
  <div class="t">Synchroniser Outlook</div>
  <div class="p">Connecter votre calendrier et votre boîte pour alimenter automatiquement projets, tâches et décisions.</div>
  <div class="cta">Connecter maintenant
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
  </div>
</div>
</body>
</html>
