<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>aiCEO · Cockpit du jour</title>
<link rel="stylesheet" href="/assets/styles/aiceo-tokens.css"/>
<style>
  :root {
    --cream: #FAF6EF;
    --cream-deep: #F2EBDD;
    --ink: #1C1A22;
    --ink-2: #3A3542;
    --ink-3: #6A6277;
    --line: #D9CFBC;
    --lilac: #A895DB;
    --lilac-soft: #EEE7FA;
    --coral: #EC7A6A;
    --coral-soft: #FBE1DC;
    --sage: #A8C8A4;
    --sage-soft: #E3EEE0;
    --gold: #B88237;
    --gold-soft: #F1E4CC;
    --warn-bg: #FBE1DC;
    --warn-fg: #8B2E1F;
    --info-bg: #EEE7FA;
    --info-fg: #4A2E7A;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.55;
    min-height: 100vh;
  }
  .layout {
    max-width: 1180px;
    margin: 0 auto;
    padding: 32px 28px 80px;
  }
  header.topbar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 28px;
  }
  header h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 28px;
    font-weight: 600;
    margin: 0;
    color: var(--ink);
  }
  header .meta {
    color: var(--ink-3);
    font-size: 14px;
  }
  header nav { display: flex; gap: 16px; }
  header nav a {
    color: var(--ink-2);
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 14px;
  }
  header nav a:hover { background: var(--lilac-soft); }

  .intent {
    background: var(--lilac-soft);
    border: 1px solid #d9cdf0;
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }
  .intent .label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-3);
    margin-bottom: 6px;
  }
  .intent .text {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    line-height: 1.4;
    color: var(--ink);
  }
  .intent .text.empty { color: var(--ink-3); font-style: italic; font-size: 16px; font-family: inherit; }

  .grid {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }
  @media (max-width: 800px) {
    .grid { grid-template-columns: 1fr; }
  }

  .card {
    background: white;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 22px 24px;
  }
  .card h2 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 14px;
    color: var(--ink);
  }

  /* Big Rocks */
  .big-rocks { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
  .big-rocks li {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--cream-deep);
    border-radius: 10px;
  }
  .big-rocks .ordre {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--coral);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
  }
  .big-rocks .title { color: var(--ink); font-weight: 500; }
  .big-rocks .status {
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--lilac-soft);
    color: var(--ink-2);
  }
  .big-rocks .status.accompli { background: var(--sage-soft); color: #2c5530; }
  .big-rocks .status.en-cours { background: var(--gold-soft); color: var(--gold); }
  .big-rocks .empty {
    color: var(--ink-3);
    font-style: italic;
    text-align: center;
    padding: 18px 0;
  }

  /* Counters */
  .counters {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .counter {
    background: var(--cream-deep);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .counter .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); }
  .counter .value {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 26px;
    color: var(--ink);
    line-height: 1.1;
    margin-top: 4px;
  }
  .counter .sub { font-size: 12px; color: var(--ink-3); margin-top: 2px; }

  /* Alerts */
  .alerts { display: flex; flex-direction: column; gap: 8px; }
  .alert {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 10px;
    align-items: start;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
  }
  .alert.warn { background: var(--warn-bg); color: var(--warn-fg); }
  .alert.info { background: var(--info-bg); color: var(--info-fg); }
  .alert.critical { background: #fcd6d6; color: #7a1818; }
  .alert .pill { font-size: 11px; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.5); }
  .alerts .empty { color: var(--ink-3); font-style: italic; padding: 10px; }

  .footer {
    margin-top: 32px;
    color: var(--ink-3);
    font-size: 12px;
    text-align: center;
  }

  .error-box {
    background: #fcd6d6;
    color: #7a1818;
    padding: 14px 18px;
    border-radius: 10px;
    margin-bottom: 18px;
  }
  .error-box .retry {
    margin-top: 8px;
    color: #7a1818;
    text-decoration: underline;
    cursor: pointer;
    background: none; border: none; padding: 0; font: inherit;
  }
</style>
</head>
<body>
  <main class="layout">
    <header class="topbar">
      <div>
        <h1>Cockpit du jour</h1>
        <div class="meta" id="meta"></div>
      </div>
      <nav>
        <a href="/">Cockpit</a>
        <a href="/arbitrage">Arbitrage</a>
        <a href="/taches">Tâches</a>
        <a href="/evening">Soir</a>
      </nav>
    </header>

    <div id="error-zone"></div>

    <section class="intent">
      <div class="label">Intention de la semaine</div>
      <div class="text" id="intention-text">…</div>
    </section>

    <section class="grid">
      <div class="card">
        <h2>Big Rocks de la semaine</h2>
        <ul class="big-rocks" id="big-rocks-list"></ul>
      </div>
      <div class="card">
        <h2>Compteurs</h2>
        <div class="counters" id="counters"></div>
      </div>
    </section>

    <section class="card">
      <h2>Alertes</h2>
      <div class="alerts" id="alerts"></div>
    </section>

    <div class="footer">
      Données live depuis <code>GET /api/cockpit/today</code> · Sprint S2 · zéro localStorage
    </div>
  </main>

<script>
/**
 * cockpit (S2.02) — consomme /api/cockpit/today, rend la page.
 * Aucun accès AICEO.STATE / localStorage applicatif.
 */
(async function () {
  const $ = (id) => document.getElementById(id);

  const ALERT_KIND_LABEL = {
    task_overdue: 'Tâche en retard',
    decision_stale: 'Décision en attente',
    big_rocks_missing: 'Big Rocks',
  };

  function renderError(msg) {
    $('error-zone').innerHTML =
      '<div class="error-box">Impossible de charger le cockpit : ' +
      msg.replace(/</g, '&lt;') +
      ' <button class="retry" onclick="location.reload()">Réessayer</button></div>';
  }

  function fmtFr(date) {
    try {
      return new Intl.DateTimeFormat('fr-FR', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      }).format(new Date(date + 'T12:00:00'));
    } catch { return date; }
  }

  function renderIntention(text) {
    const el = $('intention-text');
    if (!text) {
      el.classList.add('empty');
      el.textContent = 'Pas encore d\u2019intention pour cette semaine.';
    } else {
      el.classList.remove('empty');
      el.textContent = text;
    }
  }

  function renderBigRocks(rocks) {
    const ul = $('big-rocks-list');
    ul.innerHTML = '';
    if (!rocks.length) {
      ul.innerHTML = '<li class="empty">Aucun Big Rock défini pour cette semaine.</li>';
      return;
    }
    for (const r of rocks) {
      const li = document.createElement('li');
      const ordre = document.createElement('span');
      ordre.className = 'ordre';
      ordre.textContent = String(r.ordre);
      const title = document.createElement('span');
      title.className = 'title';
      title.textContent = r.title;
      const st = document.createElement('span');
      st.className = 'status ' + (r.status || '');
      st.textContent = r.status || '—';
      li.appendChild(ordre); li.appendChild(title); li.appendChild(st);
      ul.appendChild(li);
    }
  }

  function counter(label, value, sub) {
    const div = document.createElement('div');
    div.className = 'counter';
    const l = document.createElement('div'); l.className = 'label'; l.textContent = label;
    const v = document.createElement('div'); v.className = 'value'; v.textContent = String(value);
    div.appendChild(l); div.appendChild(v);
    if (sub) {
      const s = document.createElement('div'); s.className = 'sub'; s.textContent = sub;
      div.appendChild(s);
    }
    return div;
  }

  function renderCounters(c) {
    const el = $('counters');
    el.innerHTML = '';
    el.appendChild(counter('Tâches ouvertes', c.tasks.open, c.tasks.done_today + ' faites aujourd\u2019hui'));
    el.appendChild(counter('Tâches total', c.tasks.total));
    el.appendChild(counter('Décisions ouvertes', c.decisions.open, c.decisions.decided_today + ' décidées aujourd\u2019hui'));
    el.appendChild(counter('Événements 24h', c.events.upcoming_24h, c.events.today + ' aujourd\u2019hui'));
  }

  function renderAlerts(alerts) {
    const el = $('alerts');
    el.innerHTML = '';
    if (!alerts.length) {
      el.innerHTML = '<div class="empty">Tout est calme. Aucune alerte aujourd\u2019hui.</div>';
      return;
    }
    for (const a of alerts) {
      const div = document.createElement('div');
      div.className = 'alert ' + (a.level || 'info');
      const pill = document.createElement('span');
      pill.className = 'pill';
      pill.textContent = ALERT_KIND_LABEL[a.kind] || a.kind;
      const txt = document.createElement('span');
      txt.textContent = a.message;
      div.appendChild(pill); div.appendChild(txt);
      el.appendChild(div);
    }
  }

  try {
    const r = await fetch('/api/cockpit/today', { headers: { 'Accept': 'application/json' } });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    $('meta').textContent = fmtFr(data.date) + ' · ' + data.week_id;
    renderIntention(data.intention);
    renderBigRocks(data.big_rocks || []);
    renderCounters(data.counters);
    renderAlerts(data.alerts || []);
  } catch (e) {
    renderError(e.message || String(e));
  }
})();
</script>
</body>
</html>
