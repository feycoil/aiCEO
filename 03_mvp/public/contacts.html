<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>aiCEO · Contacts</title>
<link rel="stylesheet" href="/assets/styles/aiceo-tokens.css"/>
<style>
  :root{--cream:#FAF6EF;--cream-deep:#F2EBDD;--ink:#1C1A22;--ink-2:#3A3542;--ink-3:#6A6277;--line:#D9CFBC;--lilac:#A895DB;--lilac-soft:#EEE7FA;--coral:#EC7A6A;--coral-soft:#FBE1DC;--sage:#A8C8A4;--sage-soft:#E3EEE0}
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{background:var(--cream);color:var(--ink);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.55;min-height:100vh}
  .layout{display:grid;grid-template-columns:280px 1fr;min-height:100vh;max-width:1280px;margin:0 auto}
  aside.sidebar{background:var(--cream-deep);border-right:1px solid var(--line);padding:18px 14px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
  aside.sidebar h1{font-family:'Fraunces',Georgia,serif;font-size:18px;margin:0 0 4px;font-weight:600}
  aside.sidebar nav{display:flex;flex-direction:column;gap:2px;font-size:13.5px}
  aside.sidebar nav a{color:var(--ink-2);text-decoration:none;padding:7px 10px;border-radius:6px;transition:background .15s}
  aside.sidebar nav a:hover{background:var(--lilac-soft)}
  aside.sidebar nav a.active{background:var(--lilac);color:#fff;font-weight:500}
  main.content{padding:32px 36px;overflow-y:auto}
  header.page-head{margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-end;gap:18px;flex-wrap:wrap}
  header.page-head .crumb{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);font-weight:500}
  header.page-head h2{font-family:'Fraunces',Georgia,serif;font-size:32px;margin:6px 0;font-weight:600;letter-spacing:-.01em}
  .filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
  .chip{background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 14px;cursor:pointer;font-size:13px;color:var(--ink-2);transition:all .15s}
  .chip:hover{background:var(--cream-deep)}
  .chip.active{background:var(--lilac);border-color:var(--lilac);color:#fff}
  .search{flex:1;max-width:280px;padding:7px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:13.5px}
  .search:focus{outline:none;border-color:var(--lilac)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;gap:12px;align-items:flex-start;transition:transform .15s,box-shadow .15s}
  .card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(28,26,34,.06)}
  .avatar{width:44px;height:44px;border-radius:50%;background:var(--lilac);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0}
  .info{flex:1;min-width:0}
  .info .name{font-weight:600;font-size:14px;margin-bottom:2px}
  .info .role{font-size:12px;color:var(--ink-3)}
  .info .email{font-size:12px;color:var(--ink-3);margin-top:6px;text-decoration:none;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .info .email:hover{color:var(--lilac)}
  .trust{font-size:10.5px;padding:2px 7px;border-radius:999px;background:var(--cream-deep);color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;font-weight:500;align-self:flex-start;flex-shrink:0}
  .trust.haute{background:var(--sage-soft);color:#3F6939}
  .trust.moyenne{background:var(--lilac-soft);color:#5C4584}
  .trust.basse{background:var(--coral-soft);color:#9B3F35}
  .loading,.empty{padding:40px;text-align:center;color:var(--ink-3);font-style:italic;grid-column:1/-1}
  @media (max-width:768px){.layout{grid-template-columns:1fr}aside.sidebar{display:none}main.content{padding:20px}}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h1>aiCEO</h1>
    <nav>
      <a href="/">Cockpit</a>
      <a href="/arbitrage">Arbitrage matin</a>
      <a href="/evening">Bilan soir</a>
      <a href="/taches">Tâches</a>
      <a href="/agenda">Agenda</a>
      <a href="/revues">Revues hebdo</a>
      <a href="/groupes">Groupes</a>
      <a href="/projets">Projets</a>
      <a href="/contacts" class="active">Contacts</a>
      <a href="/decisions">Décisions</a>
      <a href="/assistant">Assistant</a>
    </nav>
  </aside>
  <main class="content">
    <header class="page-head">
      <div>
        <div class="crumb">Annuaire</div>
        <h2>Contacts</h2>
      </div>
      <input class="search" id="q" type="search" placeholder="Rechercher (nom, email, société, rôle)…"/>
    </header>
    <div class="filter-bar" id="filters">
      <span class="chip active" data-trust="">Tous</span>
      <span class="chip" data-trust="haute">Confiance haute</span>
      <span class="chip" data-trust="moyenne">Moyenne</span>
      <span class="chip" data-trust="basse">À évaluer</span>
    </div>
    <div id="grid" class="grid"><div class="loading">Chargement…</div></div>
  </main>
</div>
<script>
(() => {
  const $=id=>document.getElementById(id);
  const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const initials=name=>(name||"?").split(/\s+/).slice(0,2).map(s=>s[0]||'').join('').toUpperCase();
  const url=p=>{const q=new URLSearchParams();for(const[k,v]of Object.entries(p))if(v)q.set(k,v);const s=q.toString();return s?`/api/contacts?${s}`:`/api/contacts`};

  document.querySelectorAll('#filters .chip').forEach(c=>c.addEventListener('click',()=>{document.querySelectorAll('#filters .chip').forEach(x=>x.classList.remove('active'));c.classList.add('active');load()}));
  let t;$('q').addEventListener('input',()=>{clearTimeout(t);t=setTimeout(load,250)});

  async function load(){
    const grid=$('grid');grid.innerHTML='<div class="loading">Chargement…</div>';
    const trust=document.querySelector('#filters .chip.active')?.dataset.trust||"";
    const q=$('q').value.trim();
    try{
      const r=await fetch(url({trust_level:trust,q}));const j=await r.json();
      const cs=j.contacts||[];
      if(!cs.length){grid.innerHTML='<div class="empty">Aucun contact ne correspond.</div>';return}
      grid.innerHTML=cs.map(c=>`
        <div class="card">
          <div class="avatar">${esc(initials(c.name))}</div>
          <div class="info">
            <div class="name">${esc(c.name)}</div>
            ${c.role?`<div class="role">${esc(c.role)}${c.company?` · ${esc(c.company)}`:''}</div>`:c.company?`<div class="role">${esc(c.company)}</div>`:''}
            ${c.email?`<a class="email" href="mailto:${esc(c.email)}">${esc(c.email)}</a>`:''}
          </div>
          ${c.trust_level?`<span class="trust ${esc(c.trust_level)}">${esc(c.trust_level)}</span>`:''}
        </div>
      `).join('');
    }catch(e){grid.innerHTML=`<div class="empty">Erreur: ${esc(e.message)}</div>`}
  }
  load();
})();
</script>
</body>
</html>
