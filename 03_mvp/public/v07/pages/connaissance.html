  <style>
    .kn-toolbar { display: flex; gap: var(--space-3); margin-bottom: var(--space-4); flex-wrap: wrap; align-items: center; }
    .kn-spacer { flex: 1; }
    .kn-meta { font-size: 12px; color: var(--ink-500); }
    .kn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--space-3); }
    .kn-pin { background: var(--paper); border: 1px solid var(--ivory-200); border-radius: var(--radius-md); padding: var(--space-4); position: relative; transition: all 150ms ease; }
    .kn-pin:hover { box-shadow: var(--elev-1); transform: translateY(-1px); }
    .kn-pin-type { font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--primary-500); letter-spacing: 0.08em; text-transform: uppercase; }
    .kn-pin-title { font-size: 14px; font-weight: 600; color: var(--ink-900); margin: 6px 0 var(--space-2); line-height: 1.3; }
    .kn-pin-content { font-size: 13px; color: var(--ink-700); line-height: 1.5; }
    .kn-pin-meta { font-size: 11px; color: var(--ink-500); margin-top: var(--space-3); padding-top: var(--space-2); border-top: 1px dashed var(--ivory-200); display: flex; justify-content: space-between; }
    .kn-pin-del { position: absolute; top: 8px; right: 8px; background: transparent; border: 0; color: var(--ink-300); cursor: pointer; padding: 4px; border-radius: 4px; font-size: 14px; line-height: 1; }
    .kn-pin-del:hover { color: var(--danger); background: var(--danger-50); }

    .kn-form { background: var(--paper); border: 1px solid var(--ivory-200); border-radius: var(--radius-md); padding: var(--space-4); margin-bottom: var(--space-4); display: none; }
    .kn-form.is-open { display: block; }
    .kn-form-row { display: grid; grid-template-columns: 1fr 2fr; gap: var(--space-3); margin-bottom: var(--space-3); }
    .kn-form-field label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-700); margin-bottom: 4px; }
    .kn-form-field select, .kn-form-field input, .kn-form-field textarea { width: 100%; padding: 8px 10px; font-family: var(--font-sans); font-size: 13px; border: 1px solid var(--ivory-200); border-radius: var(--radius-md); background: var(--ivory-50); box-sizing: border-box; }
    .kn-form-field textarea { min-height: 70px; resize: vertical; }
    .kn-form-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .kn-btn { padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: var(--radius-md); cursor: pointer; border: 1px solid transparent; }
    .kn-btn-primary { background: var(--ink-900); color: var(--paper); }
    .kn-btn-ghost { background: transparent; color: var(--ink-700); border-color: var(--ivory-200); }
  </style>

<body data-route="connaissance">
  <script>
  // S6.22 Lot 14 : kill switch service worker (anti cache v06)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(rs => {
      if (rs.length === 0) return;
      console.warn('[v07] Desinstallation', rs.length, 'service worker(s) qui cachent l ancien code');
      Promise.all(rs.map(r => r.unregister())).then(() => {
        if (window.caches) {
          caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))))
            .then(() => { console.warn('[v07] caches cleared, reloading'); location.reload(); });
        } else { location.reload(); }
      });
    });
  }
  </script>
  <button class="burger-btn" type="button" id="burger-toggle"><svg class="ico" aria-hidden="true"><use href="#i-menu"/></svg></button>
  <div class="ds-mobile-backdrop" id="ds-backdrop" hidden></div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('burger-toggle');
      const bd  = document.getElementById('ds-backdrop');
      const close = () => { const ds = document.querySelector('.ds'); if (ds) ds.classList.remove('is-mobile-open'); if (bd) bd.hidden = true; document.body.classList.remove('has-mobile-drawer'); };
      const open  = () => { const ds = document.querySelector('.ds'); if (!ds) return; ds.classList.add('is-mobile-open'); if (bd) bd.hidden = false; document.body.classList.add('has-mobile-drawer'); };
      if (btn) btn.addEventListener('click', () => { const ds = document.querySelector('.ds'); if (ds && ds.classList.contains('is-mobile-open')) close(); else open(); });
      if (bd) bd.addEventListener('click', close);
      document.addEventListener('click', (e) => { if (e.target.closest('.ds-link')) close(); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); });
    });
  </script>
