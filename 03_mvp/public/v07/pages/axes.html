  <style>
    .ax-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); margin-top: var(--space-4); }
    @media (max-width: 900px) { .ax-grid { grid-template-columns: 1fr; } }
    .ax-card { background: var(--paper); border: 1px solid var(--ivory-200); border-radius: var(--radius-md); padding: var(--space-5); }
    .ax-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-3); padding-bottom: var(--space-2); border-bottom: 1px solid var(--ivory-200); }
    .ax-card-head h3 { margin: 0; font-family: var(--font-serif); font-size: 18px; font-weight: 600; color: var(--ink-900); }
    .ax-card-head p { margin: 2px 0 0; color: var(--ink-500); font-size: 12px; }
    .ax-count { font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--ink-500); padding: 2px 8px; background: var(--ivory-100); border-radius: 10px; }
    .ax-list { display: flex; flex-direction: column; gap: 6px; }
    .ax-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border: 1px solid var(--ivory-200); border-radius: var(--radius-sm); background: var(--ivory-50); transition: all 150ms ease; }
    .ax-item:hover { background: var(--paper); border-color: var(--ink-300); }
    .ax-item-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .ax-item-body { flex: 1; min-width: 0; }
    .ax-item-name { font-weight: 600; color: var(--ink-900); font-size: 14px; }
    .ax-item-meta { font-size: 11px; color: var(--ink-500); margin-top: 2px; }
    .ax-item-meta code { font-family: var(--font-mono); background: var(--ivory-100); padding: 1px 5px; border-radius: 3px; }
    .ax-item-actions { display: flex; gap: 6px; }
    .ax-btn { padding: 4px 10px; border: 1px solid var(--ivory-300); border-radius: var(--radius-sm); background: var(--paper); cursor: pointer; font-size: 12px; color: var(--ink-700); font-family: var(--font-sans); }
    .ax-btn:hover { background: var(--ivory-100); color: var(--ink-900); }
    .ax-btn-danger:hover { background: #fee; border-color: #fcc; color: #c33; }
    .ax-form { display: flex; gap: 8px; margin-top: var(--space-3); padding: var(--space-3); background: var(--ivory-50); border-radius: var(--radius-sm); border: 1px dashed var(--ivory-300); }
    .ax-form input[type="text"] { flex: 1; padding: 8px 10px; border: 1px solid var(--ivory-300); border-radius: var(--radius-sm); font-size: 13px; font-family: var(--font-sans); }
    .ax-form input[type="text"]:focus { outline: 2px solid var(--violet-300, #c4b5fd); outline-offset: 1px; }
    .ax-form .icon-input { width: 56px; text-align: center; font-size: 18px; }
    .ax-form .color-input { width: 44px; padding: 4px; cursor: pointer; border: 1px solid var(--ivory-300); border-radius: var(--radius-sm); }
    .ax-form button { padding: 8px 14px; background: var(--ink-900); color: var(--paper); border: 0; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; font-size: 13px; }
    .ax-empty { padding: 20px 12px; text-align: center; color: var(--ink-500); font-size: 13px; font-style: italic; }
    .ax-info { margin-top: var(--space-4); padding: var(--space-4); background: #f5f3ff; border: 1px solid #ddd6fe; border-radius: var(--radius-md); }
    .ax-info strong { color: #5b21b6; display: block; margin-bottom: 6px; font-size: 13px; }
    .ax-info p { margin: 0; font-size: 13px; color: var(--ink-700); line-height: 1.55; }
    .ax-actions-row { display: flex; gap: var(--space-3); margin-top: var(--space-4); flex-wrap: wrap; }
    .ax-action-card { flex: 1; min-width: 240px; padding: var(--space-3); background: var(--paper); border: 1px solid var(--ivory-200); border-radius: var(--radius-md); }
    .ax-action-card strong { display: block; font-size: 13px; color: var(--ink-900); margin-bottom: 4px; }
    .ax-action-card p { margin: 0 0 10px; font-size: 12px; color: var(--ink-500); line-height: 1.5; }
    .ax-action-card button { width: 100%; padding: 8px 12px; background: var(--ink-900); color: var(--paper); border: 0; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; font-size: 13px; }
    .ax-action-card button[disabled] { opacity: 0.5; cursor: not-allowed; }
    .ax-action-result { margin-top: 10px; font-size: 12px; color: var(--emerald-700, #059669); }
    .ax-action-result.is-error { color: #dc2626; }
  </style>
