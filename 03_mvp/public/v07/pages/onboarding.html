<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>aiCEO - Bienvenue (Onboarding v07)</title>
  <link rel="stylesheet" href="../../v06/_shared/colors_and_type.css">
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../shared/tweaks.css">
  <link rel="stylesheet" href="../components/drawer-sidebar/drawer-sidebar.css">
  <link rel="stylesheet" href="../components/header-topbar/header-topbar.css">
  <link rel="stylesheet" href="../components/modal-detail/modal-detail.css">
  <style>
    /* Progress bar etapes */
    .ob-progress {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: var(--space-5);
    }
    .ob-step-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: grid; place-items: center;
      font-family: var(--font-mono);
      font-size: 12px; font-weight: 700;
      background: var(--ivory-200);
      color: var(--ink-500);
      transition: all 200ms ease;
    }
    .ob-step-dot.is-done {
      background: var(--success);
      color: var(--paper);
    }
    .ob-step-dot.is-current {
      background: var(--primary-500, #463a54);
      color: var(--paper);
      box-shadow: 0 0 0 4px var(--primary-50);
    }
    .ob-step-line {
      flex: 0 0 30px;
      height: 2px;
      background: var(--ivory-200);
    }
    .ob-step-line.is-done { background: var(--success); }

    /* Carte etape */
    .ob-card {
      background: var(--paper);
      border: 1px solid var(--ivory-200);
      border-radius: var(--radius-md);
      padding: var(--space-7) var(--space-7);
      max-width: 720px;
      margin: 0 auto var(--space-5);
      box-shadow: var(--elev-1);
    }
    .ob-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--primary-500, #463a54);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: var(--space-2);
    }
    .ob-title {
      font-family: var(--font-signature, 'Aubrielle', cursive);
      font-size: 44px;
      line-height: 1.1;
      color: var(--ink-900);
      margin: 0 0 var(--space-3);
      letter-spacing: -0.01em;
    }
    .ob-desc {
      font-size: 15px;
      color: var(--ink-700);
      line-height: 1.6;
      margin-bottom: var(--space-5);
    }

    /* Champs */
    .ob-field { margin-bottom: var(--space-4); }
    .ob-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-700);
      margin-bottom: 6px;
    }
    .ob-input {
      width: 100%;
      padding: 12px 14px;
      font-family: var(--font-sans);
      font-size: 15px;
      color: var(--ink-900);
      background: var(--ivory-50);
      border: 1px solid var(--ivory-200);
      border-radius: var(--radius-md);
      transition: all 150ms ease;
      box-sizing: border-box;
    }
    .ob-input:focus {
      outline: none;
      border-color: var(--primary-500, #463a54);
      background: var(--paper);
      box-shadow: 0 0 0 3px var(--primary-50);
    }
    .ob-helper {
      font-size: 12px;
      color: var(--ink-500);
      margin-top: 6px;
    }

    /* Choix posture (cards) */
    .ob-postures {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--space-3);
      margin-top: var(--space-4);
    }
    .ob-posture {
      background: var(--ivory-50);
      border: 2px solid var(--ivory-200);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      cursor: pointer;
      transition: all 180ms ease;
      text-align: left;
      font-family: var(--font-sans);
    }
    .ob-posture:hover {
      border-color: var(--primary-500, #463a54);
      background: var(--paper);
    }
    .ob-posture.is-selected {
      border-color: var(--primary-500, #463a54);
      background: var(--primary-50);
      box-shadow: var(--elev-1);
    }
    .ob-posture-glyph {
      font-size: 28px;
      margin-bottom: var(--space-2);
    }
    .ob-posture-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink-900);
      margin-bottom: 4px;
    }
    .ob-posture-tag {
      font-size: 13px;
      color: var(--ink-500);
      font-style: italic;
      margin-bottom: var(--space-2);
    }
    .ob-posture-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .ob-posture-list li {
      font-size: 12px;
      color: var(--ink-700);
      padding-left: 14px;
      position: relative;
      margin-bottom: 3px;
    }
    .ob-posture-list li::before {
      content: '·';
      position: absolute;
      left: 4px;
      color: var(--primary-500);
    }

    /* Recap */
    .ob-recap {
      background: var(--ivory-50);
      border: 1px solid var(--ivory-200);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin-top: var(--space-4);
    }
    .ob-recap-row {
      display: flex;
      align-items: baseline;
      gap: var(--space-3);
      padding: 8px 0;
      border-bottom: 1px dashed var(--ivory-200);
    }
    .ob-recap-row:last-child { border-bottom: 0; }
    .ob-recap-label {
      font-size: 12px;
      color: var(--ink-500);
      font-weight: 600;
      min-width: 120px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .ob-recap-value {
      font-size: 14px;
      color: var(--ink-900);
      font-weight: 500;
      flex: 1;
    }

    /* Boutons */
    .ob-actions {
      display: flex;
      justify-content: space-between;
      gap: var(--space-3);
      margin-top: var(--space-5);
      padding-top: var(--space-4);
      border-top: 1px solid var(--ivory-200);
    }
    .ob-btn {
      padding: 10px 22px;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 150ms ease;
      border: 1px solid transparent;
    }
    .ob-btn-secondary {
      background: var(--paper);
      color: var(--ink-700);
      border-color: var(--ivory-200);
    }
    .ob-btn-secondary:hover {
      background: var(--ivory-100);
      color: var(--ink-900);
    }
    .ob-btn-primary {
      background: var(--ink-900);
      color: var(--paper);
      border-color: var(--ink-900);
    }
    .ob-btn-primary:hover {
      background: var(--ink-700);
    }
    .ob-btn-primary:disabled,
    .ob-btn-secondary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Etat success */
    .ob-success {
      text-align: center;
      padding: var(--space-6) 0;
    }
    .ob-success-glyph {
      font-size: 56px;
      margin-bottom: var(--space-3);
    }
  </style>
</head>
<body data-route="onboarding">
  <a href="#main" class="skip-link">Aller au contenu principal</a>
  <button class="burger-btn" type="button" aria-label="Ouvrir le menu" id="burger-toggle">
    <svg class="ico" aria-hidden="true"><use href="#i-menu"/></svg>
  </button>
  <div class="ds-mobile-backdrop" id="ds-backdrop" hidden></div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('burger-toggle');
      const backdrop = document.getElementById('ds-backdrop');
      const closeDrawer = () => {
        const ds = document.querySelector('.ds');
        if (ds) ds.classList.remove('is-mobile-open');
        if (backdrop) backdrop.hidden = true;
        document.body.classList.remove('has-mobile-drawer');
      };
      const openDrawer = () => {
        const ds = document.querySelector('.ds');
        if (!ds) return;
        ds.classList.add('is-mobile-open');
        if (backdrop) backdrop.hidden = false;
        document.body.classList.add('has-mobile-drawer');
      };
      if (btn) btn.addEventListener('click', () => {
        const ds = document.querySelector('.ds');
        if (ds && ds.classList.contains('is-mobile-open')) closeDrawer();
        else openDrawer();
      });
      if (backdrop) backdrop.addEventListener('click', closeDrawer);
      document.addEventListener('click', (e) => { if (e.target.closest('.ds-link')) closeDrawer(); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });
    });
  </script>

  <div id="sprite-host" hidden></div>
  <script>
    fetch('../../v06/_shared/icons.svg.html')
      .then(r => r.text())
      .then(html => { const h = document.getElementById('sprite-host'); if (h) h.innerHTML = html; })
      .catch(e => console.warn('[sprite] load failed', e));
  </script>

  <div class="app">
    <aside data-component="drawer-sidebar" data-props='{"active":"","tenant":{"label":"Mon espace"},"user":{"name":"Major Fey","role":"CEO"}}'></aside>
    <main class="app-main" id="main">

      <div data-component="header-topbar" data-props='{"breadcrumb":[{"label":"Onboarding"}],"title":"Bienvenue sur aiCEO","subtitle":"4 etapes pour configurer votre copilote (3 minutes)"}'></div>

      <!-- Progress 4 etapes -->
      <div class="ob-progress" data-region="ob-progress" aria-label="Progression"></div>

      <!-- Carte etape (rendu dynamique par store) -->
      <div data-region="ob-step-host"></div>

      <footer class="app-footer">
        <p class="strategic-q">Une bonne configuration prend 3 minutes. Une mauvaise vous coute 3 mois.</p>
        <div class="footer-meta">
          <span>aiCEO v0.7</span>
          <span>&middot;</span>
          <span>Onboarding</span>
          <span>&middot;</span>
          <span>v07 Atomic Templates</span>
        </div>
      </footer>
    </main>
  </div>

  <!-- Bottom-tab nav mobile -->
  <nav class="bottom-tab-nav" aria-label="Navigation rapide mobile">
    <a href="index.html" class="bottom-tab"><svg class="ico" aria-hidden="true"><use href="#i-home"/></svg><span>Cockpit</span></a>
    <a href="arbitrage.html" class="bottom-tab"><svg class="ico" aria-hidden="true"><use href="#i-arbitrage"/></svg><span>Triage</span></a>
    <button class="bottom-tab fab-trigger" type="button" aria-label="Capter">
      <span class="fab-circle"><svg class="ico" aria-hidden="true"><use href="#i-mic"/></svg></span>
      <span>Capter</span>
    </button>
    <a href="decisions.html" class="bottom-tab"><svg class="ico" aria-hidden="true"><use href="#i-target"/></svg><span>Decisions</span></a>
    <a href="evening.html" class="bottom-tab"><svg class="ico" aria-hidden="true"><use href="#i-evening"/></svg><span>Bilan</span></a>
  </nav>

  <!-- timeline region requise par les tests v07-atomic -->
  <div data-region="timeline" hidden></div>

  <div data-component="modal-detail"></div>

  <script type="module" src="../shared/store.js"></script>
  <script type="module" src="../shared/component-loader.js"></script>
  <script type="module" src="../stores/onboarding-store.js"></script>
</body>
</html>
