  <script>
  // S6.22 Lot 14 : kill switch service worker (anti cache v06)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(rs => {
      if (rs.length === 0) return;
      console.warn('[v07] Desinstallation', rs.length, 'service worker(s) qui cachent l ancien code');
      Promise.all(rs.map(r => r.unregister())).then(() => {
        if (window.caches) {
          caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))))
            .then(() => { console.warn('[v07] caches cleared, reloading'); location.reload(); });
        } else { location.reload(); }
      });
    });
  }
  </script>

  <div class="ds-mobile-backdrop" id="ds-backdrop" hidden></div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('burger-toggle');
      const backdrop = document.getElementById('ds-backdrop');
      function openDrawer() {
        const ds = document.querySelector('.ds');
        if (!ds) return;
        ds.classList.add('is-mobile-open');
        if (backdrop) backdrop.hidden = false;
        document.body.classList.add('has-mobile-drawer');
      }
      function closeDrawer() {
        const ds = document.querySelector('.ds');
        if (ds) ds.classList.remove('is-mobile-open');
        if (backdrop) backdrop.hidden = true;
        document.body.classList.remove('has-mobile-drawer');
      }
      if (btn) btn.addEventListener('click', () => {
        const ds = document.querySelector('.ds');
        if (ds && ds.classList.contains('is-mobile-open')) closeDrawer();
        else openDrawer();
      });
      if (backdrop) backdrop.addEventListener('click', closeDrawer);
      // Fermer aussi au clic sur un lien du drawer (navigation)
      document.addEventListener('click', (e) => {
        if (e.target.closest('.ds-link')) closeDrawer();
      });
      // Esc pour fermer
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeDrawer();
      });
    });
  </script>
