    .st-layout { display: grid; grid-template-columns: 220px 1fr; gap: var(--space-5); }
    @media (max-width: 768px) { .st-layout { grid-template-columns: 1fr; } }
    .st-tabs { background: var(--paper); border: 1px solid var(--ivory-200); border-radius: var(--radius-md); padding: var(--space-2); height: fit-content; position: sticky; top: var(--space-3); }
    .st-tab { display: flex; align-items: center; gap: 8px; width: 100%; padding: 10px 12px; border: 0; background: transparent; cursor: pointer; font-family: var(--font-sans); font-size: 13px; font-weight: 500; color: var(--ink-700); border-radius: var(--radius-md); text-align: left; transition: all 150ms ease; }

    .st-tab.is-active { background: var(--ink-900); color: var(--paper); font-weight: 600; }
    .st-tab-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.7; }
    .st-tab.is-active .st-tab-icon { opacity: 1; }

    .st-panel { background: var(--paper); border: 1px solid var(--ivory-200); border-radius: var(--radius-md); padding: var(--space-5) var(--space-6); }
    .st-panel-title { font-size: 18px; font-weight: 700; color: var(--ink-900); margin: 0 0 var(--space-2); }
    .st-panel-desc { font-size: 13px; color: var(--ink-500); margin-bottom: var(--space-4); }
    .st-field { margin-bottom: var(--space-4); }
    .st-label { display: block; font-size: 13px; font-weight: 600; color: var(--ink-900); margin-bottom: 6px; }
    .st-helper { font-size: 12px; color: var(--ink-500); margin-top: 4px; }
    .st-input, .st-select { width: 100%; max-width: 420px; padding: 10px 12px; font-family: var(--font-sans); font-size: 14px; color: var(--ink-900); background: var(--ivory-50); border: 1px solid var(--ivory-200); border-radius: var(--radius-md); box-sizing: border-box; }
    .st-input:focus, .st-select:focus { outline: none; border-color: var(--primary-500); background: var(--paper); }
    .st-toggle { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--ivory-50); border: 1px solid var(--ivory-200); border-radius: var(--radius-md); cursor: pointer; transition: all 150ms ease; max-width: 420px; }
    .st-toggle:hover { border-color: var(--primary-500); }
    .st-toggle-info { flex: 1; }
    .st-toggle-name { font-size: 14px; font-weight: 600; color: var(--ink-900); }
    .st-toggle-meta { font-size: 12px; color: var(--ink-500); }
    .st-switch { width: 36px; height: 20px; background: var(--ivory-200); border-radius: 10px; position: relative; transition: all 150ms ease; flex-shrink: 0; }
    .st-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: var(--paper); border-radius: 50%; transition: transform 150ms ease; box-shadow: var(--elev-1); }
    .st-toggle.is-on .st-switch { background: var(--success); }
    .st-toggle.is-on .st-switch::after { transform: translateX(16px); }

    .st-actions { display: flex; gap: 8px; padding-top: var(--space-4); border-top: 1px solid var(--ivory-200); margin-top: var(--space-4); }
    .st-btn { padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: var(--radius-md); cursor: pointer; border: 1px solid transparent; }
    .st-btn-primary { background: var(--ink-900); color: var(--paper); }
    .st-btn-ghost { background: transparent; color: var(--ink-700); border-color: var(--ivory-200); }
    .st-btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
    .st-btn-danger:hover { background: var(--danger-50); }

    .st-saved { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--success-50); color: var(--success); border-radius: var(--radius-pill); font-size: 12px; font-weight: 600; opacity: 0; transition: opacity 200ms ease; }
    .st-saved.is-visible { opacity: 1; }

    .st-danger-zone { background: var(--danger-50); border: 1px solid color-mix(in srgb, var(--danger) 30%, transparent); border-radius: var(--radius-md); padding: var(--space-4); margin-top: var(--space-4); }
    .st-danger-zone-title { font-size: 13px; font-weight: 700; color: var(--danger); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: var(--space-2); }

  <script>
  // S6.22 Lot 14 : kill switch service worker (anti cache v06)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(rs => {
      if (rs.length === 0) return;
      console.warn('[v07] Desinstallation', rs.length, 'service worker(s) qui cachent l ancien code');
      Promise.all(rs.map(r => r.unregister())).then(() => {
        if (window.caches) {
          caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))))
            .then(() => { console.warn('[v07] caches cleared, reloading'); location.reload(); });
        } else { location.reload(); }
      });
    });
  }
  </script>
  <button class="burger-btn" type="button" id="burger-toggle"><svg class="ico" aria-hidden="true"><use href="#i-menu"/></svg></button>
  <div class="ds-mobile-backdrop" id="ds-backdrop" hidden></div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('burger-toggle');
      const bd  = document.getElementById('ds-backdrop');
      const close = () => { const ds = document.querySelector('.ds'); if (ds) ds.classList.remove('is-mobile-open'); if (bd) bd.hidden = true; document.body.classList.remove('has-mobile-drawer'); };
      const open  = () => { const ds = document.querySelector('.ds'); if (!ds) return; ds.classList.add('is-mobile-open'); if (bd) bd.hidden = false; document.body.classList.add('has-mobile-drawer'); };
      if (btn) btn.addEventListener('click', () => { const ds = document.querySelector('.ds'); if (ds && ds.classList.contains('is-mobile-open')) close(); else open(); });
      if (bd) bd.addEventListener('click', close);
      document.addEventListener('click', (e) => { if (e.target.closest('.ds-link')) close(); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); });
    });
  </script>
