<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="../../v06/_shared/colors_and_type.css">
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../shared/tweaks.css">
  <link rel="stylesheet" href="../components/drawer-sidebar/drawer-sidebar.css">
  <link rel="stylesheet" href="../components/header-topbar/header-topbar.css">
  <link rel="stylesheet" href="../components/kpi-tile/kpi-tile.css">
  <link rel="stylesheet" href="../components/card-decision/card-decision.css">
  <link rel="stylesheet" href="../components/seg-filter/seg-filter.css">
  <link rel="stylesheet" href="../components/search-pill/search-pill.css">
  <link rel="stylesheet" href="../components/modal-detail/modal-detail.css">
  <link rel="stylesheet" href="../components/empty-state/empty-state.css">
  <link rel="stylesheet" href="../components/pill-project/pill-project.css">

  <link rel="stylesheet" href="../components/pill-status/pill-status.css">
  <link rel="stylesheet" href="../components/time-filter/time-filter.css">
  <style>
    .loading-state, .error-state { padding: var(--space-7) var(--space-5); text-align: center; color: var(--ink-500); font-style: italic; }
    .error-state { color: var(--danger); }
    .filters-row { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-5); flex-wrap: wrap; }
    .filters-spacer { flex: 1; }
    .filters-meta { font-size: var(--text-xs); color: var(--ink-500); }
    .filters-meta strong { color: var(--ink-900); font-weight: 600; }
  </style>
</head>
<body data-route="projet">
  <a href="#main" class="skip-link">Aller au contenu principal</a>
  <button class="burger-btn" type="button" aria-label="Ouvrir le menu" id="burger-toggle">
    <svg class="ico" aria-hidden="true"><use href="#i-menu"/></svg>
  </button>
  <div class="ds-mobile-backdrop" id="ds-backdrop" hidden></div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('burger-toggle');
      const backdrop = document.getElementById('ds-backdrop');
      function close() { const ds=document.querySelector('.ds'); if(ds) ds.classList.remove('is-mobile-open'); if(backdrop) backdrop.hidden=true; document.body.classList.remove('has-mobile-drawer'); }
      function open()  { const ds=document.querySelector('.ds'); if(!ds) return; ds.classList.add('is-mobile-open'); if(backdrop) backdrop.hidden=false; document.body.classList.add('has-mobile-drawer'); }
      if (btn) btn.addEventListener('click', () => { const ds=document.querySelector('.ds'); if(ds && ds.classList.contains('is-mobile-open')) close(); else open(); });
      if (backdrop) backdrop.addEventListener('click', close);
      document.addEventListener('click', (e) => { if (e.target.closest('.ds-link')) close(); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); });
    });
  </script>
  <div id="sprite-host" hidden></div>
  <script>
    fetch('../../v06/_shared/icons.svg.html').then(r=>r.text()).then(html=>{
      const h=document.getElementById('sprite-host'); if(h) h.innerHTML=html;
    }).catch(e=>console.warn('[sprite] load failed', e));
  </script>

  <div class="app">
    <aside data-component="drawer-sidebar" data-props='{"active": "projets", "tenant": {"label": "Mon espace"}, "user": {"name": "Major Fey", "role": "CEO"}}'></aside>
    <main class="app-main" id="main">
      <div data-component="header-topbar" data-props='{"breadcrumb": [{"label": "Cockpit", "href": "../../v06/index.html"}, {"label": "Projets", "href": "projets.html"}, {"label": "Detail"}], "title": "Detail du projet", "subtitle": "KPIs, taches liees, decisions liees", "actions": [{"id": "export", "label": "Exporter", "iconId": "arrow-up-right"}]}'></div>
      <div data-region="kpis" class="kpi-row"></div>
      <div class="filters-row">
        <div class="filters-spacer"></div>
        <span class="filters-meta" data-region="filter-meta">Chargement...</span>
      </div>
      <div data-region="timeline"></div>
      <div data-region="empty" hidden>
        <div data-component="empty-state" data-props='{"icon": "projects", "title": "Aucun element pour cette page", "description": "Cette page est migree en pattern Atomic v07. Donnees specifiques en S6.11-EE-2.", "cta": {"label": "Retour cockpit", "href": "index.html"}}'></div>
      </div>
      <footer class="app-footer">
        <p class="strategic-q">KPIs, taches liees, decisions liees</p>
        <div class="footer-meta">
          <span>aiCEO v0.7</span>
          <span>&middot;</span>
          <span>Detail du projet</span>
          <span>&middot;</span>
          <span>v07 · Voix exec moderne</span>
        </div>
      </footer>
    </main>
  </div>

  <nav class="bottom-tab-nav" aria-label="Navigation rapide mobile">
    <a href="index.html" class="bottom-tab"><svg class="ico" aria-hidden="true"><use href="#i-home"/></svg><span>Cockpit</span></a>
    <a href="arbitrage.html" class="bottom-tab"><svg class="ico" aria-hidden="true"><use href="#i-arbitrage"/></svg><span>Triage</span></a>
    <button class="bottom-tab fab-trigger" type="button" aria-label="Capter">
      <span class="fab-circle"><svg class="ico" aria-hidden="true"><use href="#i-mic"/></svg></span>
      <span>Capter</span>
    </button>
    <a href="decisions.html" class="bottom-tab"><svg class="ico" aria-hidden="true"><use href="#i-target"/></svg><span>Decisions</span></a>
    <a href="evening.html" class="bottom-tab"><svg class="ico" aria-hidden="true"><use href="#i-evening"/></svg><span>Bilan</span></a>
  </nav>

  <div data-component="modal-detail"></div>

  <script type="module" src="../shared/store.js"></script>
  <script type="module" src="../shared/component-loader.js"></script>
  <script type="module" src="../stores/projet-store.js"></script>
</body>
</html>
