<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>aiCEO · Portefeuille de groupes</title>
<link rel="stylesheet" href="/assets/styles/aiceo-tokens.css"/>
<style>
  :root {
    --cream: #FAF6EF; --cream-deep: #F2EBDD;
    --ink: #1C1A22; --ink-2: #3A3542; --ink-3: #6A6277;
    --line: #D9CFBC;
    --lilac: #A895DB; --lilac-soft: #EEE7FA;
    --coral: #EC7A6A; --coral-soft: #FBE1DC;
    --sage: #A8C8A4; --sage-soft: #E3EEE0;
    --amber: #C97B2C; --amber-soft: #F9E8D2;
  }
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{
    background:var(--cream);color:var(--ink);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    font-size:15px;line-height:1.55;min-height:100vh;
  }
  .layout{display:grid;grid-template-columns:280px 1fr;min-height:100vh;max-width:1280px;margin:0 auto}

  /* Sidebar partagée avec assistant.html */
  aside.sidebar{
    background:var(--cream-deep);border-right:1px solid var(--line);
    padding:18px 14px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;
  }
  aside.sidebar h1{font-family:'Fraunces',Georgia,serif;font-size:18px;margin:0 0 4px;font-weight:600}
  aside.sidebar nav{display:flex;flex-direction:column;gap:2px;font-size:13.5px}
  aside.sidebar nav a{
    color:var(--ink-2);text-decoration:none;padding:7px 10px;border-radius:6px;
    transition:background .15s;
  }
  aside.sidebar nav a:hover{background:var(--lilac-soft)}
  aside.sidebar nav a.active{background:var(--lilac);color:#fff;font-weight:500}

  /* Main */
  main.content{padding:32px 36px;overflow-y:auto}
  header.page-head{margin-bottom:28px}
  header.page-head .crumb{font-size:11.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-3);font-weight:500}
  header.page-head h2{font-family:'Fraunces',Georgia,serif;font-size:32px;margin:6px 0 6px;font-weight:600;letter-spacing:-0.01em}
  header.page-head p{margin:0;color:var(--ink-3);font-size:15px;max-width:60ch}

  /* Coach strip — ton calme */
  .coach{
    background:var(--lilac-soft);border:1px solid #DBC9F0;border-radius:12px;
    padding:12px 16px;margin-bottom:24px;display:flex;gap:12px;align-items:center;
    font-size:13.5px;color:var(--ink-2);
  }
  .coach .dot{
    width:24px;height:24px;border-radius:50%;background:var(--lilac);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;
  }

  /* Grid de cards groupes */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px}

  .group-card{
    background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;
    display:flex;flex-direction:column;gap:14px;
    transition:transform .15s,box-shadow .15s,border-color .15s;
    border-top:3px solid var(--accent,#A895DB);
  }
  .group-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(28,26,34,.06);border-color:#C9BFAA}

  .group-card .head{display:flex;gap:14px;align-items:flex-start}
  .group-card .icon{font-size:38px;line-height:1}
  .group-card .meta{flex:1;min-width:0}
  .group-card .tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--accent,#7960B5)}
  .group-card h3{font-family:'Fraunces',Georgia,serif;font-size:20px;margin:2px 0 4px;font-weight:600;letter-spacing:-.015em}
  .group-card .desc{font-size:13px;color:var(--ink-3);line-height:1.45;margin:0}

  .progress-row{display:flex;align-items:center;gap:10px}
  .progress-bar{flex:1;height:6px;background:var(--cream-deep);border-radius:4px;overflow:hidden}
  .progress-bar .fill{height:100%;background:var(--accent,#A895DB);transition:width .4s}
  .progress-label{font-size:12px;color:var(--ink-3);font-variant-numeric:tabular-nums;flex-shrink:0}

  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .kpi{display:flex;flex-direction:column;gap:2px}
  .kpi .lbl{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em}
  .kpi .val{font-size:18px;font-weight:600;font-variant-numeric:tabular-nums}
  .kpi .val.warn{color:var(--amber)}

  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .btn{
    border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;
    transition:background .15s,border-color .15s;
  }
  .btn:hover{background:var(--cream-deep)}
  .btn.primary{background:var(--accent,#A895DB);border-color:var(--accent,#A895DB);color:#fff}
  .btn.primary:hover{filter:brightness(.95)}

  /* Drawer projets */
  .drawer-bg{
    display:none;position:fixed;inset:0;background:rgba(28,26,34,.4);z-index:50;
    align-items:flex-start;justify-content:flex-end;
  }
  .drawer-bg.open{display:flex}
  .drawer{
    background:var(--cream);width:min(480px,90vw);height:100vh;overflow-y:auto;
    padding:24px;border-left:1px solid var(--line);box-shadow:-4px 0 24px rgba(0,0,0,.1);
  }
  .drawer h3{font-family:'Fraunces',Georgia,serif;font-size:22px;margin:0 0 6px}
  .drawer .close{background:none;border:none;cursor:pointer;font-size:22px;color:var(--ink-3);float:right;padding:0;line-height:1}
  .drawer .proj-list{list-style:none;padding:0;margin:14px 0 0;display:flex;flex-direction:column;gap:8px}
  .drawer .proj-list li{
    background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    cursor:pointer;transition:background .15s;
  }
  .drawer .proj-list li:hover{background:var(--cream-deep)}
  .drawer .proj-list .name{font-weight:500;font-size:14px}
  .drawer .proj-list .sub{font-size:12px;color:var(--ink-3)}
  .drawer .proj-list .pct{font-variant-numeric:tabular-nums;font-size:13px;color:var(--ink-3)}

  /* Loading & empty */
  .loading{padding:40px;text-align:center;color:var(--ink-3);font-style:italic}
  .empty{padding:40px;text-align:center;color:var(--ink-3)}

  @media (max-width:768px){
    .layout{grid-template-columns:1fr}
    aside.sidebar{display:none}
    main.content{padding:20px}
  }
</style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <h1>aiCEO</h1>
    <nav>
      <a href="/">Cockpit</a>
      <a href="/arbitrage">Arbitrage matin</a>
      <a href="/evening">Bilan soir</a>
      <a href="/taches">Tâches</a>
      <a href="/agenda">Agenda</a>
      <a href="/revues">Revues hebdo</a>
      <a href="/groupes" class="active">Groupes</a>
      <a href="/assistant">Assistant</a>
    </nav>
  </aside>

  <main class="content">
    <header class="page-head">
      <div class="crumb">Pilotage · Portefeuille</div>
      <h2>Portefeuille de groupes</h2>
      <p>Trois (ou plus) groupes. Choisissez celui qui a besoin d'attention aujourd'hui.</p>
    </header>

    <div class="coach" id="coach">
      <span class="dot">AI</span>
      <span><em>Copilote ·</em> <span id="coach-msg">Chargement du portefeuille…</span></span>
    </div>

    <div id="grid" class="grid">
      <div class="loading">Chargement des groupes…</div>
    </div>
  </main>
</div>

<div class="drawer-bg" id="drawer-bg" onclick="if(event.target===this)closeDrawer()">
  <div class="drawer" id="drawer">
    <button class="close" onclick="closeDrawer()" aria-label="Fermer">×</button>
    <div id="drawer-body"></div>
  </div>
</div>

<script>
(() => {
  // Palette par groupe — accent applique via --accent custom property
  const PALETTE = [
    { accent:"#A895DB", soft:"#EEE7FA" },  // lilac
    { accent:"#EC7A6A", soft:"#FBE1DC" },  // coral
    { accent:"#A8C8A4", soft:"#E3EEE0" },  // sage
    { accent:"#C97B2C", soft:"#F9E8D2" },  // amber
  ];

  const ICON_FALLBACK = ["🌿","🌟","🎯","🪴","🌊","🔥","💎","⚓"];

  const $  = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  async function fetchJson(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`${url} → HTTP ${r.status}`);
    return r.json();
  }

  function pickPalette(idx) { return PALETTE[idx % PALETTE.length]; }
  function pickIcon(g, idx) { return g.icon || ICON_FALLBACK[idx % ICON_FALLBACK.length]; }

  function renderCard(g, idx, detail) {
    const pal = pickPalette(idx);
    const icon = pickIcon(g, idx);
    const projs = detail?.group?.projects || [];
    const avgProgress = projs.length
      ? Math.round(projs.reduce((a,p)=>a+(p.progress||0),0) / projs.length)
      : 0;
    const projOpen = (g.counts?.projects_active) ?? projs.filter(p=>p.status!=='done'&&p.status!=='archived').length;
    const projTotal = (g.counts?.projects_total) ?? projs.length;
    const hot = projs.filter(p => p.status === 'hot').length;

    return `
      <div class="group-card" style="--accent:${pal.accent}">
        <div class="head">
          <div class="icon">${icon}</div>
          <div class="meta">
            <div class="tag">${esc(g.tagline || "Groupe")}</div>
            <h3>${esc(g.name)}</h3>
            <p class="desc">${esc(g.description || "")}</p>
          </div>
        </div>

        <div class="progress-row">
          <div class="progress-bar"><div class="fill" style="width:${avgProgress}%"></div></div>
          <div class="progress-label">${avgProgress}% moy.</div>
        </div>

        <div class="kpis">
          <div class="kpi"><div class="lbl">Projets actifs</div><div class="val">${projOpen}/${projTotal}</div></div>
          <div class="kpi"><div class="lbl">À chaud</div><div class="val ${hot?'warn':''}">${hot}</div></div>
          <div class="kpi"><div class="lbl">Avancement</div><div class="val">${avgProgress}%</div></div>
        </div>

        <div class="actions">
          <button class="btn primary" data-action="drill" data-id="${esc(g.id)}">Détail →</button>
          <button class="btn" data-action="projets" data-id="${esc(g.id)}">Tous les projets</button>
        </div>
      </div>
    `;
  }

  async function loadGroups() {
    try {
      const { groups } = await fetchJson("/api/groups");
      if (!groups || !groups.length) {
        $('grid').innerHTML = '<div class="empty">Aucun groupe configuré. Créez-en un via POST /api/groups.</div>';
        $('coach-msg').textContent = "Portefeuille vide. Commence par créer ton premier groupe.";
        return;
      }

      // Pour chaque groupe, fetch detail (projets + progression)
      const details = await Promise.all(groups.map(g => fetchJson(`/api/groups/${g.id}`).catch(() => ({ group: { projects: [] } }))));

      const cards = groups.map((g, i) => renderCard(g, i, details[i])).join("");
      $('grid').innerHTML = cards;

      // Stats agrégées pour le coach
      const allProjs = details.flatMap(d => d.group?.projects || []);
      const hot = allProjs.filter(p => p.status === 'hot').length;
      const avg = allProjs.length ? Math.round(allProjs.reduce((a,p)=>a+(p.progress||0),0) / allProjs.length) : 0;
      let msg;
      if (hot > 0) {
        msg = `${groups.length} groupes, ${allProjs.length} projets, ${hot} en mode chaud — regarde-les en priorité.`;
      } else if (avg < 30) {
        msg = `${groups.length} groupes au démarrage (${avg}% moyen). Phase d'amorçage, garde le cap.`;
      } else if (avg > 70) {
        msg = `Belle dynamique : ${avg}% moyen sur ${allProjs.length} projets. Pense aux clôtures.`;
      } else {
        msg = `${groups.length} groupes en rythme de croisière (${avg}% moyen).`;
      }
      $('coach-msg').textContent = msg;

      // Bind click handlers
      document.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', () => {
          const action = btn.dataset.action;
          const gid = btn.dataset.id;
          const idx = groups.findIndex(g => g.id === gid);
          if (action === 'drill') openDrawer(groups[idx], details[idx], idx);
          else if (action === 'projets') location.href = `/projets?group=${encodeURIComponent(gid)}`;
        });
      });
    } catch (e) {
      $('grid').innerHTML = `<div class="empty">Erreur chargement : ${esc(e.message)}</div>`;
      $('coach-msg').textContent = "Impossible de charger le portefeuille.";
    }
  }

  function openDrawer(g, detail, idx) {
    const pal = pickPalette(idx);
    const projs = detail?.group?.projects || [];
    const body = `
      <div style="border-left:3px solid ${pal.accent};padding-left:12px;margin-bottom:16px">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:${pal.accent};font-weight:600">${esc(g.tagline || "Groupe")}</div>
        <h3>${esc(g.name)}</h3>
        <p style="margin:4px 0 0;color:var(--ink-3);font-size:14px">${esc(g.description || "")}</p>
      </div>
      <div style="font-size:13px;color:var(--ink-3);margin-bottom:8px">${projs.length} projet${projs.length>1?'s':''}</div>
      <ul class="proj-list">
        ${projs.length ? projs.map(p => `
          <li data-pid="${esc(p.id)}">
            <div>
              <div class="name">${esc(p.name)}</div>
              <div class="sub">${esc(p.tagline || p.status || '')}</div>
            </div>
            <div class="pct">${p.progress ?? 0}%</div>
          </li>
        `).join("") : '<li style="cursor:default"><div class="sub">Aucun projet rattaché à ce groupe.</div></li>'}
      </ul>
    `;
    $('drawer-body').innerHTML = body;
    $('drawer-bg').classList.add('open');

    // Click projet → navigation vers page projet (S4.05 implementera)
    $('drawer-body').querySelectorAll('[data-pid]').forEach(li => {
      li.addEventListener('click', () => {
        const pid = li.dataset.pid;
        location.href = `/projet?id=${encodeURIComponent(pid)}`;
      });
    });
  }

  function closeDrawer() { $('drawer-bg').classList.remove('open'); }
  window.closeDrawer = closeDrawer;

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && $('drawer-bg').classList.contains('open')) closeDrawer();
  });

  loadGroups();
})();
</script>
</body>
</html>
